<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת בחינות - מקיף כאוכב</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Rubik', sans-serif; }
        .selectable-text { user-select: text; }
        .unselectable { user-select: none; }
        /* מניעת העתקה כללית למעט מקומות מורשים */
        .prevent-copy { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        .allow-copy { -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text; }
        
        /* גלילה מותאמת */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 prevent-copy overflow-hidden h-screen w-screen flex flex-col">

    <div id="app" class="h-full w-full flex flex-col"></div>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-6 text-center">
            <div id="modalIcon" class="text-4xl mb-4 text-red-600"><i class="fas fa-exclamation-triangle"></i></div>
            <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>
            <p id="modalMessage" class="text-slate-700 text-lg mb-6"></p>
            <button onclick="closeModal()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">הבנתי</button>
        </div>
    </div>

<script>
// ==========================================
// מסד נתונים מקומי (לשמירת המבחנים בין רענונים)
// ==========================================
let submissions = JSON.parse(localStorage.getItem('exam_submissions')) || [];
function saveSubmissions() {
    localStorage.setItem('exam_submissions', JSON.stringify(submissions));
}

// ==========================================
// מצב המערכת (State)
// ==========================================
let currentUser = null; 
let currentView = 'login'; // login, instructions, exam, summary, teacher_dashboard, teacher_grading
let currentExamStep = 'part1'; // part1, part2, part3
let answers = {};
let cheatLogs = [];
let timeLeft = 0;
let timerInterval = null;
let selectedSubmissionId = null;

// טקסטים קבועים
const EXAM_TEXT = [
  { id: 'A', text: 'בעשורים האחרונים הפכה העיר המודרנית למקום שבו חיים מיליוני אנשים בצפיפות גבוהה, ובו מתקיימים בו־זמנית תעשייה, מסחר, תרבות ופנאי. רשויות רבות מדגישות את חשיבות איכות החיים של התושבים, אך בפועל נוצרת לעיתים אחידות חיצונית בלבד – אותם קניונים, אותן שכונות ואותו מבנה רחובות – בלי תשומת לב מספקת לצרכים הייחודיים של כל קהילה. במקרים רבים פועלות בעיר רשויות מקומיות שונות, שלכל אחת מהן תקציב, סדרי עדיפויות ויכולת אכיפה משלה, ולכן לא פעם מתעוררות מחלוקות בין תושבים לבין הרשות באשר לאחריות על מיפגעי רעש, זיהום או עומסי תנועה.' },
  { id: 'B', text: 'אחד הנושאים המרכזיים בדיון הציבורי הוא השאלה עד כמה העיר מצליחה ליצור תנאים התומכים בחֹסֶן נפשי של התושבים. מחקרים מצביעים על כך שחיים בסביבה רועשת, עמוסת תנועה ותעשייה, עלולים להגביר תחושות של לחץ ואף להוביל לדיכאון בקרב קבוצות מסוימות. תושבים אלה נחשבים לעיתים קבוצת סיכון, במיוחד כאשר הם נתקלים שוב ושוב בבעיות חוזרות – כמו כבישים מסוכנים, משאבת מים מקולקלת בבניין או דליפה חוזרת במערכת הביוב – בלי לקבל פתרון יעיל. במצבים כאלה מתפתחת אצל רבים תחושה של מודעות גבוהה לבעיה, אך גם ייאוש, והם מרגישים שהעיר מתעלמת מן הצרכים שלהם.' },
  { id: 'C', text: 'במטרה להתמודד עם בעיות אלו, קובעת הרשות המקומית תקנות שונות שנועדו לצמצם נזק ולהסדיר את החיים המשותפים. תקנות אלה כוללות, למשל, הגבלת שעות המנוחה שבהן אסור להפעיל מכשירים רועשים, או קביעה של קנסות כבדים לבעלי עסקים שמפרים שוב ושוב את כללי הבטיחות. לעיתים מוחלט אף על מצב חירום נקודתי בשכונה מסוימת, בעקבות הסלמה ברמת הרעש או הזיהום. אלא שלא תמיד התקנות מיושמות באופן אפקטיבי; חלק מן התושבים טוענים שמנגנון הפיקוח מסורבל, שהעונשים במקרים רבים אינם עוברים ממינימום מסוים, ושהרשות נוטה לגלות סבלנות מופרזת כלפי גורמים פוגעניים.' },
  { id: 'D', text: 'העיר המודרנית מפעילה מנגנון אכיפה מורכב, שבמסגרתו פועלים פקחים, מהנדסים ויועצים משפטיים. מצד אחד, הרשות חייבת לאכוף את התקנות, לטפל בכל תלונה של תושב ולדאוג שלא יתפתחו אירועים קיצוניים. מצד אחר, ישנו חשש שהקצנה במדיניות האכיפה – למשל הטלת מאסר מהיר על בעלי עסקים או עימותים פיזיים עם תושבים – תוביל דווקא להסלמה ביחסים ביניהם ובין הרשות. כדי להימנע מכך מנסים ברשויות רבות ליישם מדיניות הדרגתית: תחילה משלחים אזהרה, אחר כך מוטל קנס, ורק במקרה של הפרה חוזרת ונשנית שוקלים צעדים חמורים יותר. למרבה הצער, לא כל הצדדים מוכנים לשתף פעולה, ולעיתים מתפתחים סכסוכים ארוכים.' },
  { id: 'E', text: 'בעידן הרשתות החברתיות מתפתחת תופעה חדשה: תושבים משתמשים בפלטפורמות מקוונות כדי לפרסם ביקורת על הרשות המקומית, לחשוף הדלפה של מסמכים פנימיים ולשתף סרטונים המתעדים סחרחורת של רעש וזיהום באזורים מסוימים. סרטונים אלו עשויים להרתיח את הציבור וליצור רושם שהמצב בעיר בלתי נסבל, גם אם בפועל מדובר במספר מצומצם של מיפגעים. במקרים מסוימים, עצם פרסום הסרטונים תורם להקצנה של עמדות: חלק מן התושבים מגבשים דעה קדומה שלפיה כל נציג ציבור מושחת או אדיש, ואחרים מתעלמים מכל שיפור שחל בשטח. יחד עם זאת, הודות ל־לחץ הציבורי ברשת, רשויות מסוימות החלו לפעול בשקיפות גבוהה יותר ולפרסם מידע ברור לגבי התלונות שהתקבלו והטיפול בהן.' },
  { id: 'F', text: 'הדיון הציבורי אינו מתמקד רק בנתונים, אלא גם בשפה שבה משתמשים הצדדים. כך, למשל, יש הבדל בין תיאור מפעל כגורם בוטה ל“זיהום אוויר מסוים”, לבין הצגתו כ“סכנה בריאותית חמורה לתושבי האזור”. בחירה במילים חריפות עשויה להיתפס כהגזמה או כהפלגה, אך לעיתים מילים אלו נועדו להחמיר בכוונה את התיאור כדי לעורר את הציבור לפעולה. יש תושבים הסבורים כי כדאי להימנע מהקצנה בשיח ולהעדיף טענה עניינית, מבוססת נתונים. אחרים מאמינים שבלי שפה חריפה לא יקשיבו להם. לפיכך, השאלה כיצד לדבר על הבעיות בעיר הופכת לחלק בלתי נפרד מן הוויכוח הציבורי על איכות החיים.' }
];
const ADDED_TEXT = 'בעיר מסוימת הותקן בשנים האחרונות מנגנון מדידה חדש, הבוחן את רמת הרעש ברחובות מרכזיים במשך כל שעות היממה. הנתונים הראו כי בשל עבודות תעשייה ליליות, תחבורה כבדה ומקומות בילוי, רמת הרעש בשכונות סמוכות עלתה בהרבה מעל הסף שנקבע בתקנות. בעקבות זאת הכריזה הרשות המקומית על מצב חירום זמני בשתי שכונות, הגבילה את פעילות העסקים בשעות מאוחרות והטילה קנסות על מי שהמשיך להפעיל ציוד רועש. חלק מן התושבים טענו שהצעדים הללו פוגעים בחופש העיסוק, ואחרים טענו שהרשות נמנעה במשך שנים מלטפל בבעיה, ולכן הצעדים כעת הם רק מינימום נדרש לשיפור המצב.';

// ==========================================
// פונקציות ליבה לרינדור
// ==========================================
function render() {
    const app = document.getElementById('app');
    
    if (!currentUser) {
        app.innerHTML = getLoginHTML();
        return;
    }
    
    if (currentUser.role === 'teacher') {
        if (currentView === 'teacher_dashboard') app.innerHTML = getTeacherDashboardHTML();
        else if (currentView === 'teacher_grading') app.innerHTML = getTeacherGradingHTML();
    } else {
        if (currentView === 'instructions') app.innerHTML = getInstructionsHTML();
        else if (currentView === 'exam') app.innerHTML = getExamHTML();
        else if (currentView === 'summary') app.innerHTML = getSummaryHTML();
    }
}

function showModal(title, message, isSuccess = false) {
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalMessage').innerText = message;
    document.getElementById('modalIcon').innerHTML = isSuccess ? '<i class="fas fa-check-circle text-green-500"></i>' : '<i class="fas fa-exclamation-triangle"></i>';
    document.getElementById('modalIcon').className = isSuccess ? 'text-4xl mb-4 text-green-500' : 'text-4xl mb-4 text-red-600';
    document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    if(currentView === 'summary' && !currentUser) { // After submit logout
        render();
    }
}

// ==========================================
// פונקציות התחברות ומערכת
// ==========================================
let loginTab = 'student';
function switchLoginTab(tab) {
    loginTab = tab;
    render();
}

function handleLogin(e) {
    e.preventDefault();
    const orgCode = document.getElementById('orgCode').value;
    
    if (loginTab === 'teacher') {
        const pass = document.getElementById('password').value;
        if (pass === '210286' && orgCode) {
            currentUser = { role: 'teacher', orgCode, name: 'צוות הוראה' };
            currentView = 'teacher_dashboard';
            render();
        } else {
            showModal('שגיאה', 'סיסמה או סמל מוסד שגויים');
        }
    } else {
        const id = document.getElementById('studentId').value;
        const name = document.getElementById('studentName').value;
        const extraTime = document.getElementById('extraTime') ? document.getElementById('extraTime').checked : false;
        
        if (id && name && orgCode) {
            currentUser = { role: 'student', id, name, orgCode, extraTime };
            currentView = 'instructions';
            answers = {};
            cheatLogs = [];
            timeLeft = extraTime ? 10350 : 9000; // 172.5 mins or 150 mins
            render();
        }
    }
}

function logout() {
    currentUser = null;
    currentView = 'login';
    if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    stopTimer();
    render();
}

// ==========================================
// מנגנוני מניעת רמאות וטיימר (תלמיד)
// ==========================================
function startExam() {
    currentView = 'exam';
    currentExamStep = 'part1';
    
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(err => console.log(err));
    }
    
    startTimer();
    setupAntiCheat();
    render();
}

function setupAntiCheat() {
    document.addEventListener('visibilitychange', handleVisibilityChange);
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('copy', handleCopyPaste);
}

function removeAntiCheat() {
    document.removeEventListener('visibilitychange', handleVisibilityChange);
    document.removeEventListener('fullscreenchange', handleFullscreenChange);
    document.removeEventListener('copy', handleCopyPaste);
}

function handleVisibilityChange() {
    if (document.hidden && currentView === 'exam') {
        cheatLogs.push({ time: new Date().toISOString(), action: 'מעבר כרטיסייה / יציאה מהחלון' });
        showModal('אזהרת מערכת!', 'זוהתה יציאה ממסך המבחן. הפעולה נרשמה במערכת וידווח למורה.');
    }
}

function handleFullscreenChange() {
    if (!document.fullscreenElement && currentView === 'exam') {
        cheatLogs.push({ time: new Date().toISOString(), action: 'יציאה ממסך מלא' });
        showModal('שים לב!', 'עליך להישאר במסך מלא במהלך כל הבחינה.');
    }
}

function handleCopyPaste(e) {
    // מאפשר העתקה רק מתוך טקסטים מורשים
    if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && !e.target.closest('.allow-copy')) {
        e.preventDefault();
    }
}

function startTimer() {
    timerInterval = setInterval(() => {
        timeLeft--;
        const timerEl = document.getElementById('timerDisplay');
        if(timerEl) timerEl.innerText = formatTime(timeLeft);
        
        if(timeLeft <= 300 && timerEl) {
            timerEl.classList.add('text-red-600', 'bg-red-100', 'animate-pulse');
        }
        
        if (timeLeft <= 0) {
            stopTimer();
            submitExam(true);
        }
    }, 1000);
}

function stopTimer() {
    if(timerInterval) clearInterval(timerInterval);
}

function formatTime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

// ==========================================
// ניהול המבחן והתשובות
// ==========================================
function updateAns(key, value) {
    answers[key] = value;
    // חיווי שמירה
    const saveEl = document.getElementById('saveStatus');
    if(saveEl) {
        saveEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> שומר...';
        saveEl.classList.replace('text-green-600', 'text-slate-400');
        clearTimeout(window.saveTimeout);
        window.saveTimeout = setTimeout(() => {
            saveEl.innerHTML = '<i class="fas fa-check-circle"></i> נשמר';
            saveEl.classList.replace('text-slate-400', 'text-green-600');
        }, 1000);
    }
}

function changeStep(step) {
    if(step === 'summary') currentView = 'summary';
    else {
        currentView = 'exam';
        currentExamStep = step;
    }
    render();
}

function submitExam(autoSubmit = false) {
    const newSub = {
        id: Date.now().toString(),
        student: currentUser,
        answers: answers,
        cheatLogs: cheatLogs,
        submittedAt: new Date().toISOString(),
        graded: false,
        finalScore: 0
    };
    
    submissions.push(newSub);
    saveSubmissions();
    
    stopTimer();
    removeAntiCheat();
    
    if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    
    currentUser = null;
    currentView = 'login';
    
    let msg = autoSubmit ? 'הזמן תם! המבחן הוגש אוטומטית למערכת.' : 'המבחן הוגש בהצלחה. תשובותיך נקלטו במערכת. אין אפשרות לצפות בציונים בשלב זה.';
    showModal('סיום בחינה', msg, true);
    // Render will happen after modal is closed
}

// ==========================================
// HTML Generators
// ==========================================

function getLoginHTML() {
    return `
    <div class="flex-1 flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
            <div class="bg-blue-800 p-6 text-center text-white">
                <h1 class="text-2xl font-bold mb-2">בית ספר מקיף כאוכב אבו אלהיא</h1>
                <p class="text-blue-200">מערכת בחינות מקוונת</p>
            </div>
            
            <div class="flex border-b border-slate-200">
                <button onclick="switchLoginTab('student')" class="flex-1 py-4 text-center font-medium transition-colors ${loginTab === 'student' ? 'text-blue-800 border-b-2 border-blue-800 bg-blue-50/50' : 'text-slate-500 hover:text-slate-700'}">
                    <i class="fas fa-user ml-2"></i> כניסת תלמידים
                </button>
                <button onclick="switchLoginTab('teacher')" class="flex-1 py-4 text-center font-medium transition-colors ${loginTab === 'teacher' ? 'text-blue-800 border-b-2 border-blue-800 bg-blue-50/50' : 'text-slate-500 hover:text-slate-700'}">
                    <i class="fas fa-lock ml-2"></i> כניסת צוות
                </button>
            </div>

            <form onsubmit="handleLogin(event)" class="p-6 space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">סמל מוסד</label>
                    <input type="text" id="orgCode" class="allow-copy w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="הכנס סמל מוסד" required>
                </div>

                ${loginTab === 'student' ? `
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">תעודת זהות</label>
                        <input type="text" id="studentId" class="allow-copy w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">שם מלא</label>
                        <input type="text" id="studentName" class="allow-copy w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                    <div class="flex items-center gap-2 pt-2">
                        <input type="checkbox" id="extraTime" class="w-4 h-4 text-blue-600 rounded cursor-pointer">
                        <label for="extraTime" class="text-sm font-medium text-slate-700 cursor-pointer">האם אתה זכאי לתוספת זמן?</label>
                    </div>
                ` : `
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">סיסמת מורה</label>
                        <input type="password" id="password" class="allow-copy w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="סיסמת כניסה" required>
                    </div>
                `}

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors mt-4">
                    היכנס למערכת <i class="fas fa-arrow-left mr-2"></i>
                </button>
            </form>
        </div>
    </div>`;
}

function getInstructionsHTML() {
    return `
    <div class="flex-1 overflow-y-auto bg-slate-50 flex flex-col items-center p-4 py-12">
        <div class="max-w-3xl w-full bg-white rounded-xl shadow-lg p-8 border border-slate-200">
            <div class="text-center mb-8 border-b pb-6">
                <h1 class="text-3xl font-bold text-slate-800 mb-2">עברית: הבנה, הבעה ולשון</h1>

function getHeaderHTML() {
    return `
    <header class="bg-white shadow-sm border-b px-6 py-3 flex justify-between items-center shrink-0 z-20">
        <div class="flex items-center gap-4">
            <div class="font-bold text-lg text-slate-800">מבחן בעברית</div>
            <div class="hidden md:flex items-center gap-2 text-sm text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
                <i class="fas fa-user"></i> ${currentUser.name} (${currentUser.id})
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div id="saveStatus" class="text-green-600 flex items-center gap-1 text-sm font-medium">
                <i class="fas fa-check-circle"></i> נשמר
            </div>
            <div id="timerDisplay" class="font-mono text-xl font-bold flex items-center gap-2 px-4 py-1 rounded-lg bg-slate-100 text-slate-800 border border-slate-200">
                ${formatTime(timeLeft)}
            </div>
        </div>
    </header>`;
}

function getFooterHTML() {
    const isP1 = currentExamStep === 'part1';
    const isP2 = currentExamStep === 'part2';
    const isP3 = currentExamStep === 'part3';
    
    return `
    <footer class="bg-white border-t p-4 flex justify-between items-center shrink-0 z-20">
        <div class="flex gap-2">
            <button onclick="changeStep('${isP3 ? 'part2' : 'part1'}')" ${isP1 ? 'disabled' : ''} class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg flex items-center gap-2 disabled:opacity-50 transition-colors font-medium">
                <i class="fas fa-chevron-right"></i> פרק קודם
            </button>
        </div>
        
        <div class="flex gap-3">
            <button onclick="changeStep('part1')" class="w-3 h-3 rounded-full transition-all ${isP1 ? 'bg-blue-600 w-8' : 'bg-slate-300 hover:bg-slate-400'}"></button>
            <button onclick="changeStep('part2')" class="w-3 h-3 rounded-full transition-all ${isP2 ? 'bg-blue-600 w-8' : 'bg-slate-300 hover:bg-slate-400'}"></button>
            <button onclick="changeStep('part3')" class="w-3 h-3 rounded-full transition-all ${isP3 ? 'bg-blue-600 w-8' : 'bg-slate-300 hover:bg-slate-400'}"></button>
            <button onclick="changeStep('summary')" class="w-3 h-3 rounded-full transition-all bg-slate-300 hover:bg-slate-400"></button>
        </div>

        <div class="flex gap-2">
            <button onclick="changeStep('${isP1 ? 'part2' : isP2 ? 'part3' : 'summary'}')" class="px-6 py-2 bg-blue-100 text-blue-800 font-bold hover:bg-blue-200 rounded-lg flex items-center gap-2 transition-colors shadow-sm">
                ${isP3 ? 'לסיכום והגשה' : 'פרק הבא'} <i class="fas fa-chevron-left"></i>
            </button>
        </div>
    </footer>`;
}

function getExamHTML() {
    let content = '';
    if (currentExamStep === 'part1') content = getPart1HTML();
    if (currentExamStep === 'part2') content = getPart2HTML();
    if (currentExamStep === 'part3') content = getPart3HTML();

    return `
        ${getHeaderHTML()}
        <main class="flex-1 overflow-hidden relative">
            ${content}
        </main>
        ${getFooterHTML()}
    `;
}

// Helper for Radio Buttons
function radioGroup(name, options, currentValue) {
    return `<div class="space-y-3 pr-10">
        ${options.map((opt, i) => `
            <label class="flex items-start gap-3 p-4 border rounded-xl cursor-pointer transition-all hover:bg-slate-50 border-slate-200 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-500">
                <input type="radio" name="${name}" value="${opt}" ${currentValue === opt ? 'checked' : ''} onchange="updateAns('${name}', this.value)" class="mt-1 w-5 h-5 text-blue-600">
                <span class="text-slate-700 text-lg leading-relaxed">${opt}</span>
            </label>
        `).join('')}
    </div>`;
}

function getPart2HTML() {
    const topics = [
      { id: 'A', title: 'א. בחירת מקצוע לעתיד.', desc: 'לקראת סיום הלימודים בבית הספר התיכון, תלמידים רבים עומדים בפני בחירה משמעותית בחייהם - בחירת מקצוע לעתיד. ההתלבטות אינה פשוטה: האם לבחור מקצוע בתחום שמעניין אותי ויכול לגרום לי הנאה וסיפוק... בחיבורכם הביעו את דעתכם בנושא. בחרו בשני שיקולים שנראים בעיניכם הכי חשובים, נמקו את בחירתכם והביאו דוגמאות.' },
      { id: 'B', title: 'ב. התמכרות בני הנוער למשחקי מחשב.', desc: 'בימינו משחקי מחשב הם פעילות פופולארית בקרב בני נוער. יש להם השפעות חיוביות, אבל כאשר השימוש בהם הופך להתמכרות, הוא עלול לפגוע בבריאות, בלימודים ובחיי החברה. בחיבורכם פרטו שתי סיבות שבגללן בני הנוער מתמכרים למשחקים, והציעו דרכים שבאמצעותן ניתן להתמודד עם התופעה.' },
      { id: 'C', title: 'ג. אירוע מפחיד ועצוב שחוויתם.', desc: 'רוב בני האדם חווים בחייהם אירועים מפחידים ועצובים. בחיבורכם תארו אירוע שגרם לכם לחוות חרדה, עצב או שניהם גם יחד. ספרו על המחשבות והרגשות שחוויתם בתגובה לאירוע ועל הדרך שבה התמודדתם עם החוויה.' }
    ];

    let topicHtml = topics.map(t => `
        <div onclick="updateAns('essayTopic', '${t.id}'); render();" class="p-5 rounded-2xl border-2 cursor-pointer transition-all ${answers.essayTopic === t.id ? 'border-blue-600 bg-blue-50 shadow-md transform -translate-y-1' : 'border-slate-200 bg-white hover:border-blue-300'}">

function getSummaryHTML() {
    const isAns = (v) => v && v.toString().trim() !== '';
    const status = {
        'פרק א - סגורות (1, 4א)': isAns(answers.q1a) && isAns(answers.q1b) && isAns(answers.q4a),
        'פרק א - פתוחות (2, 3, 4ב, 6)': isAns(answers.q2a_1) && isAns(answers.q2b) && isAns(answers.q3a) && isAns(answers.q6a),
        'פרק א - אוצר מילים (5)': isAns(answers.q5_meaning_1) && isAns(answers.q5_meaning_2),
        'פרק ב - חיבור': isAns(answers.essayTopic) && (answers.essayText||'').length > 30,
        'פרק ג - שורש ובניין (8)': isAns(answers.q8_a_root) && isAns(answers.q8_b_root),
        'פרק ג - תצורת מילה (9)': isAns(answers.q9_אזהרה) && isAns(answers.q9_אטרקציות),
        'פרק ג - מילות קישור (10)': (isAns(answers.q10a)?1:0)+(isAns(answers.q10b)?1:0)+(isAns(answers.q10c)?1:0) >= 2
    };

    const total = Object.keys(status).length;
    const completed = Object.values(status).filter(Boolean).length;
    const pct = Math.round((completed / total) * 100);

    return `
    ${getHeaderHTML()}
    <main class="flex-1 overflow-y-auto bg-slate-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-2xl shadow-lg p-8 max-w-2xl w-full text-center border border-slate-200">
            <h2 class="text-3xl font-bold text-slate-800 mb-6">סיכום לפני הגשה</h2>
            
            <div class="mb-8">
                <div class="w-32 h-32 mx-auto relative mb-4">
                    <svg viewBox="0 0 36 36" class="w-full h-full stroke-current text-slate-200">
                        <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke-width="3" />
                        <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke-width="3" stroke-dasharray="${pct}, 100" class="${pct===100 ? 'text-green-500' : 'text-blue-500'}" />
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center flex-col">
                        <span class="text-3xl font-bold text-slate-700">${pct}%</span>
                    </div>
                </div>
                <p class="text-slate-600 text-lg font-medium">ענית על ${completed} מתוך ${total} חלקי המבחן</p>
            </div>

            <div class="text-right bg-slate-50 p-6 rounded-xl border mb-8 space-y-3">
                ${Object.entries(status).map(([k, isDone]) => `
                    <div class="flex items-center justify-between border-b pb-2 last:border-0 last:pb-0">
                        <span class="text-slate-700 font-medium">${k}</span>
                        ${isDone 
                            ? `<span class="text-green-700 bg-green-100 px-3 py-1 rounded text-sm font-bold flex items-center gap-1"><i class="fas fa-check-circle"></i> הושלם</span>` 
                            : `<span class="text-amber-700 bg-amber-100 px-3 py-1 rounded text-sm font-bold flex items-center gap-1"><i class="fas fa-exclamation-triangle"></i> חסר</span>`}
                    </div>
                `).join('')}
            </div>

            ${completed < total ? `
                <div class="bg-amber-50 text-amber-800 p-4 rounded-lg mb-8 flex gap-3 text-right">
                    <i class="fas fa-exclamation-triangle mt-1"></i>
                    <p class="text-sm font-medium">שים לב: לא השלמת את כל חלקי המבחן. תוכל לחזור אחורה ולהשלים (הזמן ממשיך לרוץ), או להגיש את המבחן כפי שהוא כעת.</p>
                </div>
            ` : ''}

            <button onclick="submitExam(false)" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-md transition-transform hover:scale-[1.02] flex justify-center items-center gap-2 text-xl">
                <i class="fas fa-paper-plane"></i> הגש מבחן סופית למורה
            </button>
        </div>
    </main>
    ${getFooterHTML()}
    `;
}

                </td>
                <td class="p-4">
                    ${s.graded ? `<span class="px-3 py-1 rounded-full text-sm font-bold border ${s.finalScore >= 81 ? 'bg-green-50 text-green-700 border-green-200' : s.finalScore >= 61 ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-red-50 text-red-700 border-red-200'}">${s.finalScore}</span>` : '-'}
                </td>
                <td class="p-4">
                    <button onclick="selectedSubmissionId='${s.id}'; currentView='teacher_grading'; render();" class="text-blue-600 hover:text-blue-800 hover:underline font-bold text-sm bg-blue-50 px-3 py-1 rounded">
                        ${s.graded ? 'צפה / ערוך' : 'בדוק עכשיו <i class="fas fa-pencil-alt ml-1"></i>'}
                    </button>
                </td>
            </tr>
        `).join('');

    return `
    ${getTeacherHeaderHTML()}
    <main class="p-6 max-w-7xl mx-auto flex-1 w-full allow-copy">
        <div class="grid md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center gap-4">
                <div class="bg-blue-100 p-4 rounded-full text-blue-600 text-xl"><i class="fas fa-file-alt"></i></div>
                <div><p class="text-sm text-slate-500 font-medium">הגשות סה"כ</p><p class="text-2xl font-bold">${mySubs.length}</p></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center gap-4">
                <div class="bg-amber-100 p-4 rounded-full text-amber-600 text-xl"><i class="fas fa-clock"></i></div>
                <div><p class="text-sm text-slate-500 font-medium">ממתינים לבדיקה</p><p class="text-2xl font-bold">${mySubs.length - gradedCount}</p></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center gap-4">
                <div class="bg-green-100 p-4 rounded-full text-green-600 text-xl"><i class="fas fa-check"></i></div>
                <div><p class="text-sm text-slate-500 font-medium">נבדקו</p><p class="text-2xl font-bold">${gradedCount}</p></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex items-center gap-4">
                <div class="bg-purple-100 p-4 rounded-full text-purple-600 text-xl"><i class="fas fa-chart-line"></i></div>
                <div><p class="text-sm text-slate-500 font-medium">ממוצע כיתתי</p><p class="text-2xl font-bold">${avg}</p></div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50">
                <h2 class="font-bold text-lg text-slate-800">רשימת תלמידים (כיתה: ${currentUser.orgCode})</h2>
                <button onclick="exportCSV()" class="flex items-center gap-2 text-sm font-medium bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition">
                    <i class="fas fa-download"></i> ייצא לאקסל
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-sm border-b">
                            <th class="p-4 font-bold">ת"ז</th>
                            <th class="p-4 font-bold">שם תלמיד/ה</th>
                            <th class="p-4 font-bold">מועד הגשה</th>
                            <th class="p-4 font-bold">חריגות (רמאות)</th>
                            <th class="p-4 font-bold">סטטוס</th>
                            <th class="p-4 font-bold">ציון</th>
                            <th class="p-4 font-bold">פעולה</th>
                        </tr>
                    </thead>
                    <tbody>${rowHtml}</tbody>
                </table>
            </div>
        </div>
    </main>`;
}

function exportCSV() {
    const mySubs = submissions.filter(s => s.student.orgCode === currentUser.orgCode);
    const headers = ['ת"ז', 'שם', 'סטטוס', 'ציון'];
    const rows = mySubs.map(s => [s.student.id, s.student.name, s.graded ? 'נבדק' : 'ממתין', s.graded ? s.finalScore : '-']);
    const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `ציונים_כיתה_${currentUser.orgCode}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

// Teacher Grading View variables
let currentGrades = {};
let currentComments = {};
let currentPenalty = 0;

function getTeacherGradingHTML() {
    const sub = submissions.find(s => s.id === selectedSubmissionId);
    if(!sub) { currentView='teacher_dashboard'; return ''; }
    
    // Init state if empty
    if(Object.keys(currentGrades).length === 0 && sub.grades) currentGrades = sub.grades;
    if(Object.keys(currentComments).length === 0 && sub.comments) currentComments = sub.comments;
    if(!currentPenalty && sub.penalty) currentPenalty = sub.penalty;

    const ans = sub.answers;
    
    const displayAns = (q, a) => `
        <div class="bg-slate-50 p-4 rounded-lg border border-slate-100 mb-4">
            <p class="font-bold text-slate-800 mb-2">${q}</p>
            <p class="text-slate-700 whitespace-pre-wrap text-lg">${a || '<span class="text-slate-400 italic">לא נענה</span>'}</p>
        </div>`;
        
    const cheatHtml = sub.cheatLogs?.length > 0 ? `
        <div class="bg-red-50 p-4 border-b border-red-200">
            <h3 class="font-bold text-red-800 flex items-center gap-2 mb-2"><i class="fas fa-exclamation-triangle"></i> התראות מערכת (חריגות שנקלטו)</h3>
            <ul class="list-disc pr-6 text-sm text-red-700 font-medium">
                ${sub.cheatLogs.map(l => `<li>${new Date(l.time).toLocaleTimeString()} - ${l.action}</li>`).join('')}
            </ul>
        </div>` : '';

    return `
    ${getTeacherHeaderHTML()}
    <div class="flex flex-col md:flex-row gap-6 p-6 h-[calc(100vh-76px)] overflow-hidden w-full max-w-7xl mx-auto allow-copy">
        <div class="w-full md:w-2/3 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
            <div class="bg-slate-800 text-white p-4 shrink-0 flex justify-between items-center">
                <h2 class="font-bold text-lg"><i class="fas fa-file-alt ml-2"></i> תשובות התלמיד: ${sub.student.name}</h2>
                <span class="text-slate-300 font-mono text-sm">ת"ז: ${sub.student.id}</span>
            </div>
            ${cheatHtml}
            <div class="overflow-y-auto p-6 flex-1 space-y-8">
                <div>
                    <h3 class="text-xl font-bold text-slate-800 border-b-2 border-slate-200 pb-2 mb-4 text-blue-800">פרק א' - הבנת הנקרא</h3>
                    ${displayAns("1.א טענה מרכזית", ans.q1a)}
                    ${displayAns("1.ב ירידה בחוסן הנפשי", ans.q1b)}
                    ${displayAns("2.א.1 תקנות לשיפור", ans.q2a_1)}
                    ${displayAns("2.א.2 טענות תושבים", ans.q2a_2)}
                    ${displayAns("2.ב מדיניות הדרגתית", ans.q2b)}
                    ${displayAns("3.א תועלת בסרטונים ברשתות", ans.q3a)}
                    ${displayAns("3.ב עמדת הכותב (שפה חריפה)", ans.q3b)}
                    ${displayAns("4.א המטרה העיקרית", ans.q4a)}
                    ${displayAns("4.ב משמעות 'משלה'", ans.q4b)}
                    ${displayAns("5. מילה 1: " + (ans.q5_word_1||''), "פירוש: " + (ans.q5_meaning_1||'') + "\nמשפט: " + (ans.q5_sentence_1||''))}
                    ${displayAns("5. מילה 2: " + (ans.q5_word_2||''), "פירוש: " + (ans.q5_meaning_2||'') + "\nמשפט: " + (ans.q5_sentence_2||''))}
                    ${displayAns("5. מילה 3: " + (ans.q5_word_3||''), "פירוש: " + (ans.q5_meaning_3||'') + "\nמשפט: " + (ans.q5_sentence_3||''))}
                    ${displayAns("6.א תקנות וקנסות", ans.q6a)}
                    ${displayAns("6.ב חוסן נפשי (רעש מתמשך)", ans.q6b)}
                </div>
                <div>
                    <h3 class="text-xl font-bold text-slate-800 border-b-2 border-slate-200 pb-2 mb-4 text-blue-800">פרק ב' - חיבור</h3>
                    <p class="font-bold text-slate-700 mb-2">נושא נבחר: ${ans.essayTopic || 'לא נבחר'}</p>
                    <div class="bg-slate-50 border border-slate-200 p-6 rounded-lg whitespace-pre-wrap leading-loose min-h-[200px] text-lg">
                        ${ans.essayText || '- אין תשובה -'}
                    </div>
                </div>
                <div>
                    <h3 class="text-xl font-bold text-slate-800 border-b-2 border-slate-200 pb-2 mb-4 text-blue-800">פרק ג' - לשון</h3>
                    ${['a','b','c','d','e'].map(id => `
                        <div class="mb-4 bg-slate-50 p-3 rounded border">
                            <p class="font-bold mb-2">משפט ${id.toUpperCase()}:</p>
                            <p class="text-slate-700">שורש: <strong>${ans[`q8_${id}_root`] || '-'}</strong> | בניין: <strong>${ans[`q8_${id}_binyan`] || '-'}</strong> | השלמה: <strong>${ans[`q8_${id}_fill`] || '-'}</strong></p>
                        </div>
                    `).join('')}
                    ${displayAns("9. תצורת מילה", 
                        `אזהרה: ${ans.q9_אזהרה||'-'}, הסלמה: ${ans.q9_הסלמה||'-'}, אטרקציות: ${ans.q9_אטרקציות||'-'}, התעלמות: ${ans.q9_התעלמות||'-'}, מנגנון: ${ans.q9_מנגנון||'-'}, איכות: ${ans.q9_איכות||'-'}`)}
                    ${displayAns("10. מילות קישור", `א: ${ans.q10a||'-'}\nב: ${ans.q10b||'-'}\nג: ${ans.q10c||'-'}`)}
                </div>
            </div>
        </div>

        <div class="w-full md:w-1/3 bg-white rounded-xl shadow-lg border border-slate-200 flex flex-col overflow-hidden">
            <div class="bg-blue-50 p-4 border-b border-blue-100 flex justify-between items-center shrink-0">
                <h2 class="font-bold text-blue-900 text-xl">פאנל מתן ציונים</h2>
                <div class="text-2xl font-black text-blue-700 bg-white px-4 py-1 rounded-full shadow-sm border border-blue-200">
                    <span id="totalScoreDisplay">${calculateCurrentScore()}</span> <span class="text-sm font-normal text-slate-500">/ 100</span>
                </div>
            </div>
            
            <div class="p-3 bg-slate-50 border-b shrink-0 flex gap-2">
                 <button onclick="aiGradeSimulation()" class="flex-1 bg-purple-100 text-purple-800 hover:bg-purple-200 py-2 rounded-lg font-bold flex justify-center items-center gap-2 transition border border-purple-200">
                     <i class="fas fa-robot"></i> הצעת ציון אוטומטית (AI)
                 </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-5 bg-slate-50/50">
                ${gradeBoxHtml('q1a', 10, "1א (10 נק')")}
                ${gradeBoxHtml('q1b', 10, "1ב (10 נק')")}
                ${gradeBoxHtml('q2', 20, "2 (20 נק')")}
                ${gradeBoxHtml('q3', 20, "3 (20 נק')")}
                ${gradeBoxHtml('q4', 10, "4 (10 נק')")}
                ${gradeBoxHtml('q5', 10, "5 מילים (10 נק')")}
                ${gradeBoxHtml('q6', 20, "6 (20 נק')")}
                <div class="border-t border-slate-300 my-4"></div>
                ${gradeBoxHtml('essay', 25, "חיבור (25 נק')")}
                <div class="border-t border-slate-300 my-4"></div>
                ${gradeBoxHtml('lashon', 25, "לשון (25 נק')")}
                
                <div class="bg-red-50 p-4 rounded-xl border border-red-200 mt-6">
                    <label class="font-bold text-red-800 block mb-2">הפחתת נקודות (קנס):</label>
                    <input type="number" min="0" max="100" class="w-full border-2 border-red-200 p-2 rounded-lg outline-none focus:border-red-500 bg-white font-bold" oninput="updatePenalty(this.value)" value="${currentPenalty || ''}" placeholder="0">
                </div>
            </div>

            <div class="p-4 bg-white border-t shrink-0">
                <button onclick="saveGrading()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-md transition-transform hover:scale-[1.02] flex justify-center items-center gap-2 text-lg">
                    <i class="fas fa-save"></i> שמור ציון וסיים בדיקה
                </button>
            </div>
        </div>
    </div>`;
}

function gradeBoxHtml(id, max, label) {
    return `
    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm transition-all focus-within:border-blue-400 focus-within:ring-2 focus-within:ring-blue-100">
        <div class="flex justify-between items-center mb-3">
            <label class="font-bold text-slate-800">${label}</label>
            <input type="number" min="0" max="${max}" class="w-20 border-2 border-slate-200 bg-slate-50 text-center font-bold text-lg p-1.5 rounded-lg outline-none focus:border-blue-500 focus:bg-white transition-colors" oninput="updateGrade('${id}', this.value)" value="${currentGrades[id] !== undefined ? currentGrades[id] : ''}" placeholder="0">
        </div>
        <textarea class="w-full text-sm border border-slate-200 p-2 rounded-lg bg-slate-50 outline-none focus:bg-white transition-colors" placeholder="הערות למורה/תלמיד..." oninput="updateComment('${id}', this.value)" rows="1">${currentComments[id] || ''}</textarea>
    </div>`;
}

function updateGrade(id, val) {
    currentGrades[id] = Number(val);
    document.getElementById('totalScoreDisplay').innerText = calculateCurrentScore();
}

function updateComment(id, val) {
    currentComments[id] = val;
}

function updatePenalty(val) {
    currentPenalty = Number(val);
    document.getElementById('totalScoreDisplay').innerText = calculateCurrentScore();
}

function calculateCurrentScore() {
    let sum = Object.values(currentGrades).reduce((a, b) => a + (Number(b) || 0), 0);
    return Math.max(0, sum - (Number(currentPenalty) || 0));
}

function aiGradeSimulation() {
    const sub = submissions.find(s => s.id === selectedSubmissionId);
    const ans = sub.answers;
    
    // Auto mark closed questions
    if(ans.q1a && ans.q1a.includes("אחידות חיצונית")) currentGrades.q1a = 10; else currentGrades.q1a = 0;
    if(ans.q1b && ans.q1b.includes("סביבה רועשת ומזוהמת")) currentGrades.q1b = 10; else currentGrades.q1b = 0;
    if(ans.q4a && ans.q4a.includes("לדון במתח")) currentGrades.q4a = 10; else currentGrades.q4a = 0;
    
    // Essay length simulation
    if(ans.essayText && ans.essayText.length > 200) { currentGrades.essay = 23; currentComments.essay = '🤖 AI: אורך חיבור תקין, כתיבה זורמת. מומלץ לבדוק פיסוק ידנית.'; }
    
    // Language random/simple check
    let lashonScore = 0;
    if(ans.q8_a_root === 'ד-ג-ש') lashonScore+=5;
    if(ans.q9_אזהרה === 'בסיס_וצורן') lashonScore+=5;
    if(ans.q10a === 'אבל') lashonScore+=5;
    currentGrades.lashon = lashonScore > 0 ? lashonScore + 10 : 0; // Just random mock logic
    
    render(); // Re-render grading view to show updated inputs
    showModal('AI Assistant', 'הצעת הציון הוזנה לתיבות (בדיקה אוטומטית של שאלות סגורות והערכת חיבור). אנא עברו ואשרו ידנית.', true);
}

function saveGrading() {
    const index = submissions.findIndex(s => s.id === selectedSubmissionId);
    if(index > -1) {
        submissions[index].grades = currentGrades;
        submissions[index].comments = currentComments;
        submissions[index].penalty = currentPenalty;
        submissions[index].finalScore = calculateCurrentScore();
        submissions[index].graded = true;
        
        saveSubmissions();
        
        // Reset local grading state
        currentGrades = {};
        currentComments = {};
        currentPenalty = 0;
        
        currentView = 'teacher_dashboard';
        render();
    }
}

// ==========================================
// הפעלה ראשונית
// ==========================================
window.onload = render;

</script>
</body>
</html>
