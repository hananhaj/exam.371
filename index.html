<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מבחן מקוון - עברית: הבנה, הבעה ולשון</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #f3f4f6;
            user-select: none; /* Prevent general selection */
        }

        .selectable-text {
            user-select: text; /* Allow selection only in specific areas like the text */
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #888; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        /* Print blocking */
        @media print {
            body { display: none !important; }
        }

        .lock-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>
<body class="text-gray-800 overflow-x-hidden min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-900 text-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <i class="fas fa-school text-2xl"></i>
                <div>
                    <h1 class="text-xl font-bold">בית ספר מקיף כאוכב אבו אלהיגא</h1>
                    <p class="text-sm opacity-80">עברית: הבנה, הבעה ולשון | שאלון 371</p>
                </div>
            </div>
            <div id="header-controls" class="flex items-center gap-6">
                <!-- Timer will be injected here -->
            </div>
        </div>
    </header>

    <!-- Main Content App Area -->
    <main id="app" class="flex-grow container mx-auto p-4 flex flex-col">
        <!-- Views rendered by JS -->
    </main>

    <!-- Footer -->
    <footer class="bg-gray-200 text-gray-600 p-4 text-center mt-auto border-t">
        <p class="font-medium">הכינה המורה חנאן חאג' מוחמד &copy; 2026</p>
    </footer>

    <script>
        // --- Firebase Integration ---
        let db, auth, collection, addDoc, onSnapshot, serverTimestamp, signInAnonymously, signInWithCustomToken, onAuthStateChanged, docRef, updateDoc, getDocs, deleteDoc;
        let currentUser = null;
        window.firebaseLoaded = false;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'hebrew-exam-371';
        let studentsData = []; // Data from Firestore
        let submissionsUnsubscribe = null;

        // Dynamic import of Firebase modules to maintain script block structure
        import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js").then(module => {
            const initializeApp = module.initializeApp;
            
            // Your custom Firebase configuration with fallback to injected config if available
            const fallbackConfig = {
              apiKey: "AIzaSyBFkXVHaJFwsvxvzdZywnOTA1V7yny8ugs",
              authDomain: "hebrew-exam1-371.firebaseapp.com",
              projectId: "hebrew-exam1-371",
              storageBucket: "hebrew-exam1-371.firebasestorage.app",
              messagingSenderId: "814394994442",
              appId: "1:814394994442:web:35b94640eb1f431fb994f3",
              measurementId: "G-LTMZ4Q2H29"
            };
            
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;

            const app = initializeApp(firebaseConfig);
            
            Promise.all([
                import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"),
                import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js")
            ]).then(([firestore, authModule]) => {
                db = firestore.getFirestore(app);
                auth = authModule.getAuth(app);
                collection = firestore.collection;
                addDoc = firestore.addDoc;
                onSnapshot = firestore.onSnapshot;
                serverTimestamp = firestore.serverTimestamp;
                docRef = firestore.doc; // Needed for updating specific documents
                updateDoc = firestore.updateDoc; // Needed for saving scores
                getDocs = firestore.getDocs; // Needed to check student existing submission
                deleteDoc = firestore.deleteDoc; // Needed for deleting submissions
                signInAnonymously = authModule.signInAnonymously;
                signInWithCustomToken = authModule.signInWithCustomToken;
                onAuthStateChanged = authModule.onAuthStateChanged;

                onAuthStateChanged(auth, user => {
                    currentUser = user;
                    if (user && state.view === 'teacher_dash') {
                        loadSubmissions();
                    }
                });

                // Strict quiet authentication (No popups)
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                        window.firebaseLoaded = true;
                    } catch (e) {
                        console.error("Firebase Auth Error", e);
                    }
                };
                
                initAuth();
            });
        });

        function loadSubmissions() {
            if(!currentUser || !window.firebaseLoaded) return;
            if (submissionsUnsubscribe) submissionsUnsubscribe();
            
            // Following strict artifacts path rules to ensure stability
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
            
            submissionsUnsubscribe = onSnapshot(colRef, (snapshot) => {
                studentsData = [];
                snapshot.forEach(doc => {
                    studentsData.push({ id: doc.id, ...doc.data() });
                });
                
                // Sort array to show newest first locally
                studentsData.sort((a, b) => {
                    if(!a.timestamp) return 1;
                    if(!b.timestamp) return -1;
                    return b.timestamp.seconds - a.timestamp.seconds;
                });

                if(state.view === 'teacher_dash') render(); 
            }, (error) => {
                console.error("Error fetching submissions:", error);
            });
        }

        // --- Custom Modal Function (Replaces alert/confirm blocked in iframes) ---
        window.showModal = function(message, isConfirm = false, onConfirm = null) {
            const existing = document.getElementById('custom-modal');
            if(existing) existing.remove();

            const modalHtml = `
                <div id="custom-modal" class="fixed inset-0 bg-black bg-opacity-60 z-[9999] flex items-center justify-center backdrop-blur-sm">
                    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full mx-4 text-center transform transition-all border-t-4 border-blue-600">
                        <div class="text-xl font-bold mb-6 text-gray-800">${message}</div>
                        <div class="flex justify-center gap-4 mt-6">
                            ${isConfirm ? `<button id="modal-cancel" class="px-6 py-2 bg-gray-200 text-gray-800 font-bold rounded-lg hover:bg-gray-300 transition">ביטול</button>` : ''}
                            <button id="modal-ok" class="px-8 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition shadow">אישור</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);

            document.getElementById('modal-ok').onclick = () => {
                document.getElementById('custom-modal').remove();
                if (onConfirm) onConfirm();
            };

            if (isConfirm) {
                document.getElementById('modal-cancel').onclick = () => {
                    document.getElementById('custom-modal').remove();
                };
            }
        };

        // --- Helper functions for teacher review ---
        function translateType(val) {
            if(val === 'root') return 'שורש ומשקל';
            if(val === 'base') return 'בסיס וצורן';
            if(val === 'loan') return 'שאילה מלעז';
            return 'לא סומן';
        }

        const q9WordsList = ['אזהרה', 'רשמית', 'הסלמה', 'התעלמות', 'מנגנון', 'פלטפורמות'];

        // --- State Management ---
        const EXAM_DURATION = 112.5 * 60; // 112.5 minutes in seconds
        const EXTRA_TIME_MULTIPLIER = 1.15;
        const TEACHER_LOGIN_CODE = "210286";
        const TEACHER_UNLOCK_CODE = "014371";

        let state = {
            view: 'login', // login, instructions, exam, summary, submitted, teacher_dash, teacher_review, student_results
            user: { role: null, name: '', id: '', classRoom: '', instCode: '', extraTime: false },
            filterClass: '', // Add filter for teacher dashboard
            exam: {
                section: 1, // 1, 2, 3
                timeRemaining: 0,
                timerInterval: null,
                isLocked: false,
                answers: JSON.parse(localStorage.getItem('exam_answers')) || {},
                marked: JSON.parse(localStorage.getItem('exam_marked')) || {}
            },
            internalCopy: false,
            currentReview: null // Holds the student data being reviewed by the teacher
        };

        // --- Core Application Logic ---
        const appDiv = document.getElementById('app');

        function render() {
            let html = '';
            
            // Render specific view
            switch(state.view) {
                case 'login': html = getLoginHtml(); break;
                case 'instructions': html = getInstructionsHtml(); break;
                case 'exam': html = getExamHtml(); break;
                case 'summary': html = getSummaryHtml(); break;
                case 'submitted': html = getSubmittedHtml(); break;
                case 'teacher_dash': html = getTeacherDashHtml(); break;
                case 'teacher_review': html = getTeacherReviewHtml(); break;
                case 'student_results': html = getStudentResultsHtml(); break;
            }

            appDiv.innerHTML = html;
            updateHeader();

            // Lock screen overlay
            if (state.exam.isLocked && state.view === 'exam') {
                appDiv.innerHTML += getLockScreenHtml();
            }

            attachEventListeners();
        }

        function updateHeader() {
            const headerControls = document.getElementById('header-controls');
            if (state.view === 'exam' || state.view === 'summary') {
                const mins = Math.floor(state.exam.timeRemaining / 60).toString().padStart(2, '0');
                const secs = (state.exam.timeRemaining % 60).toString().padStart(2, '0');
                const timeColor = state.exam.timeRemaining < 300 ? 'text-red-300 animate-pulse' : 'text-white';
                
                headerControls.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <p class="font-bold text-sm">${state.user.name} | ${state.user.id}</p>
                            <p class="text-xs opacity-80">כיתה: ${state.user.classRoom}</p>
                        </div>
                        <div class="bg-blue-800 px-4 py-2 rounded-lg flex items-center gap-2 border border-blue-700">
                            <i class="fas fa-clock ${timeColor}"></i>
                            <span class="text-xl font-mono font-bold ${timeColor}" dir="ltr">${mins}:${secs}</span>
                        </div>
                    </div>
                `;
            } else if (state.view === 'teacher_dash' || state.view === 'teacher_review' || state.view === 'student_results') {
                headerControls.innerHTML = `
                    <button id="btn-logout" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded shadow transition">
                        <i class="fas fa-sign-out-alt ml-2"></i>יציאה
                    </button>
                `;
            } else {
                headerControls.innerHTML = '';
            }
        }

        // --- HTML Generators ---

        function getLoginHtml() {
            return `
                <div class="max-w-4xl mx-auto w-full mt-10">
                    <div class="bg-white rounded-xl shadow-lg overflow-hidden flex flex-col md:flex-row">
                        <!-- Student Login -->
                        <div class="p-8 md:w-1/2 border-l border-gray-200">
                            <h2 class="text-2xl font-bold text-blue-900 mb-6 border-b pb-2"><i class="fas fa-user-graduate ml-2"></i>כניסת תלמיד</h2>
                            <form id="student-login-form" class="space-y-4">
                                <div><label class="block text-sm font-medium mb-1">שם מלא</label><input type="text" id="stu-name" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200"></div>
                                <div><label class="block text-sm font-medium mb-1">מספר סידורי</label><input type="text" id="stu-id" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200"></div>
                                <div class="flex gap-4">
                                    <div class="w-1/2"><label class="block text-sm font-medium mb-1">כיתה</label><input type="text" id="stu-class" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200"></div>
                                    <div class="w-1/2"><label class="block text-sm font-medium mb-1">סמל מוסד</label><input type="text" id="stu-inst" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200"></div>
                                </div>
                                <div class="pt-2 flex items-center gap-2 bg-blue-50 p-3 rounded">
                                    <input type="checkbox" id="stu-extra" class="w-5 h-5 text-blue-600">
                                    <label for="stu-extra" class="font-medium text-blue-900">אני זכאי/ת לתוספת זמן (15%)</label>
                                </div>
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded mt-4 transition">התחברות לבחינה</button>
                            </form>
                        </div>
                        
                        <!-- Teacher Login -->
                        <div class="p-8 md:w-1/2 bg-gray-50">
                            <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2"><i class="fas fa-chalkboard-teacher ml-2"></i>כניסת מורה (מנהל מערכת)</h2>
                            <form id="teacher-login-form" class="space-y-4">
                                <div><label class="block text-sm font-medium mb-1">סמל מוסד</label><input type="text" id="tea-inst" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200"></div>
                                <div><label class="block text-sm font-medium mb-1">קוד בחינה</label><input type="password" id="tea-code" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200"></div>
                                <button type="submit" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded mt-4 transition">כניסה למערכת הבדיקה</button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
        }

        function getInstructionsHtml() {
            return `
                <div class="max-w-3xl mx-auto w-full mt-10 glass-panel rounded-xl p-8 border border-gray-200">
                    <h2 class="text-3xl font-bold text-center text-blue-900 mb-6">הוראות הבחינה</h2>
                    
                    <div class="bg-blue-50 border border-blue-200 p-6 rounded-lg mb-6 text-blue-900">
                        <ul class="space-y-3 font-medium text-lg list-disc list-inside">
                            <li><strong>משך הבחינה:</strong> שעתיים וחצי (שעה לימודית = 45 דקות). ${state.user.extraTime ? '<span class="text-green-600">(כולל תוספת זמן של 15%)</span>' : ''}</li>
                            <li><strong>מבנה השאלון:</strong></li>
                            <ul class="mr-6 space-y-1 list-circle opacity-90">
                                <li>פרק א - הבנת הנקרא (50 נקודות)</li>
                                <li>פרק ב - חיבור (25 נקודות)</li>
                                <li>פרק ג - לשון (25 נקודות)</li>
                            </ul>
                            <li><strong>סה"כ נקודות:</strong> 100 נקודות</li>
                        </ul>
                    </div>

                    <div class="bg-red-50 border border-red-200 p-6 rounded-lg mb-8 text-red-900">
                        <h3 class="font-bold mb-2"><i class="fas fa-exclamation-triangle ml-2"></i>הנחיות חשובות ואבטחה:</h3>
                        <ul class="space-y-2 list-disc list-inside text-sm">
                            <li>יש לענות על כל השאלות בגוף השאלון במערכת.</li>
                            <li>ניתן לגרור מילים או להעתיק טקסט <strong>מתוך קטע הקריאה בלבד</strong>. אין להדביק טקסט ממקורות חיצוניים.</li>
                            <li>הקפידו על כתיב, פיסוק וכללי דקדוק.</li>
                            <li><strong>הבחינה מתבצעת במסך מלא. יציאה ממסך מלא תנעל את המבחן ותדרוש התערבות מורה!</strong></li>
                        </ul>
                    </div>

                    <div class="text-center">
                        <button id="btn-start-exam" class="bg-green-600 hover:bg-green-700 text-white text-xl font-bold py-4 px-12 rounded-full shadow-lg transition transform hover:scale-105">
                            <i class="fas fa-play ml-2"></i>התחל בחינה
                        </button>
                    </div>
                </div>
            `;
        }

        const readingText = `
            <div class="selectable-text leading-relaxed text-lg space-y-6">
                <h3 class="text-2xl font-bold text-center mb-6">החיים בעיר המודרנית – בין איכות חיים להסלמה</h3>
                <p><strong>פסקה א:</strong> בעשורים האחרונים הפכה העיר המודרנית למקום שבו חיים מיליוני אנשים בצפיפות גבוהה, ובו מתקיימים בו־זמנית תעשייה, מסחר, תרבות ופנאי. רשויות רבות מדגישות את חשיבות איכות החיים של התושבים, אך בפועל נוצרת לעיתים אחידות חיצונית בלבד – אותם קניונים, אותן שכונות ואותו מבנה רחובות – בלי תשומת לב מספקת לצרכים הייחודיים של כל קהילה. במקרים רבים פועלות בעיר רשויות מקומיות שונות, שלכל אחת מהן תקציב, סדרי עדיפויות ויכולת אכיפה משלה, ולכן לא פעם מתעוררות מחלוקות בין תושבים לבין הרשות באשר לאחריות על מיפגעי רעש, זיהום או עומסי תנועה.</p>
                <p><strong>פסקה ב:</strong> אחד הנושאים המרכזיים בדיון הציבורי הוא השאלה עד כמה העיר מצליחה ליצור תנאים התומכים בחֹסֶן נפשי של התושבים. מחקרים מצביעים על כך שחיים בסביבה רועשת, עמוסת תנועה ותעשייה, עלולים להגביר תחושות של לחץ ואף להוביל לדיכאון בקרב קבוצות מסוימות. תושבים אלה נחשבים לעיתים קבוצת סיכון, במיוחד כאשר הם נתקלים שוב ושוב בבעיות חוזרות – כמו כבישים מסוכנים, משאבת מים מקולקלת בבניין או דליפה חוזרת במערכת הביוב – בלי לקבל פתרון יעיל. במצבים כאלה מתפתחת אצל רבים תחושה של מודעות גבוהה לבעיה, אך גם ייאוש, והם מרגישים שהעיר מתעלמת מן הצרכים שלהם.</p>
                <p><strong>פסקה ג:</strong> במטרה להתמודד עם בעיות אלו, קובעת הרשות המקומית תקנות שונות שנועדו לצמצם נזק ולהסדיר את החיים המשותפים. תקנות אלה כוללות, למשל, הגבלת שעות המנוחה שבהן אסור להפעיל מכשירים רועשים, או קביעה של קנסות כבדים לבעלי עסקים שמפרים שוב ושוב את כללי הבטיחות. לעיתים מוחלט אף על מצב חירום נקודתי בשכונה מסוימת, בעקבות הסלמה ברמת הרעש או הזיהום. אלא שלא תמיד התקנות מיושמות באופן אפקטיבי; חלק מן התושבים טוענים שמנגנון הפיקוח מסורבל, שהעונשים במקרים רבים אינם עוברים ממינימום מסוים, ושהרשות נוטה לגלות סבלנות מופרזת כלפי גורמים פוגעניים.</p>
                <p><strong>פסקה ד:</strong> העיר המודרנית מפעילה מנגנון אכיפה מורכב, שבמסגרתו פועלים פקחים, מהנדסים ויועצים משפטיים. מצד אחד, הרשות חייבת לאכוף את התקנות, לטפל בכל תלונה של תושב ולדאוג שלא יתפתחו אירועים קיצוניים. מצד אחר, ישנו חשש שהקצנה במדיניות האכיפה – למשל הטלת מאסר מהיר על בעלי עסקים או עימותים פיזיים עם תושבים – תוביל דווקא להסלמה ביחסים ביניהם ובין הרשות. כדי להימנע מכך מנסים ברשויות רבות ליישם מדיניות הדרגתית: תחילה משלחים אזהרה, אחר כך מוטל קנס, ורק במקרה של הפרה חוזרת ונשנית שוקלים צעדים חמורים יותר. למרבה הצער, לא כל הצדדים מוכנים לשתף פעולה, ולעיתים מתפתחים סכסוכים ארוכים.</p>

                                                <td class="border p-2"><input type="radio" name="9t${idx}" value="loan" onchange="saveAnswer('9t${idx}', 'loan')" ${state.exam.answers['9t'+idx] === 'loan' ? 'checked' : ''} class="w-5 h-5 cursor-pointer"></td>
                                            </tr>
                                        `}).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Part C -->
                        <div>
                            <h3 class="text-xl font-bold mb-4 bg-gray-100 p-2 rounded">חלק ג – מילות קישור (6 נק')</h3>
                            <div class="space-y-6">
                                ${generateMCQ('10a', 'א. הקיפו מילת קישור מתאימה: התושבים מרגישים תנאים טובים, _______ אחרים טוענים שבלתי נסבל.', ['אבל', 'מכיוון ש', 'לכן', 'כדי ש'], true)}
                                ${generateMCQ('10b', 'ב. הקיפו מילת קישור מתאימה: הרשות הגבילה שעות, _______ להפחית רעש.', ['אף על פי ש', 'כדי', 'למרות', 'או'], true)}
                                ${generateMCQ('10c', 'ג. החליפו מילת קישור (אבל) במילה נרדפת: התושבים ביקשו פעולה, אבל המשיכו לסבול.', ['למרות זאת', 'משום כך', 'כדי ש', 'או'], true)}
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="flex-grow flex flex-col">
                    <!-- Exam Content -->
                    <div class="flex-grow mb-6">
                        ${sectionContent}
                    </div>
                    
                    <!-- Navigation Footer -->
                    <div class="bg-white p-4 rounded-lg shadow flex justify-between items-center sticky bottom-0">
                        <button onclick="navigateSection(-1)" class="${state.exam.section === 1 ? 'invisible' : ''} bg-gray-200 hover:bg-gray-300 px-6 py-2 rounded transition">
                            <i class="fas fa-arrow-right ml-2"></i>פרק קודם
                        </button>
                        
                        <div class="flex gap-2">
                            <span class="w-3 h-3 rounded-full ${state.exam.section === 1 ? 'bg-blue-600' : 'bg-gray-300'}"></span>
                            <span class="w-3 h-3 rounded-full ${state.exam.section === 2 ? 'bg-blue-600' : 'bg-gray-300'}"></span>
                            <span class="w-3 h-3 rounded-full ${state.exam.section === 3 ? 'bg-blue-600' : 'bg-gray-300'}"></span>
                        </div>

                        ${state.exam.section === 3 ? 
                            `<button onclick="state.view = 'summary'; render();" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded transition font-bold">
                                סיום ומעבר להגשה<i class="fas fa-check mr-2"></i>
                            </button>` 
                            : 
                            `<button onclick="navigateSection(1)" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded transition">
                                פרק הבא<i class="fas fa-arrow-left mr-2"></i>
                            </button>`
                        }
                    </div>
                </div>
            `;
        }

        // Exam Question Helpers
        function generateMCQ(id, text, options, horizontal = false) {
            let optsHtml = options.map((opt, i) => `
                <label class="flex items-center gap-2 p-2 hover:bg-blue-50 rounded cursor-pointer border border-transparent hover:border-blue-200 transition ${horizontal ? 'bg-gray-50 border-gray-200 flex-1 justify-center' : ''}">
                    <input type="radio" name="${id}" value="${i}" onchange="saveAnswer('${id}', '${opt}')" ${state.exam.answers[id] === opt ? 'checked' : ''} class="w-4 h-4 text-blue-600">
                    <span class="${horizontal ? 'whitespace-nowrap' : ''}">${opt}</span>
                </label>
            `).join('');
            
            const layoutClass = horizontal ? 'flex flex-col sm:flex-row gap-3 mt-3' : 'space-y-1';
            return `
                <div class="mb-6 relative">
                    <button onclick="toggleMark('${id}')" class="absolute left-0 top-0 text-gray-400 hover:text-yellow-500 ${state.exam.marked[id] ? 'text-yellow-500' : ''}" title="סמן לבדיקה חוזרת"><i class="fas fa-star"></i></button>
                    <p class="font-bold mb-3 pr-6">${text}</p>
                    <div class="${layoutClass} pr-6">${optsHtml}</div>
                </div>
            `;
        }

        function generateTextarea(id, text) {
            return `
                <div class="mb-6 relative">
                    <button onclick="toggleMark('${id}')" class="absolute left-0 top-0 text-gray-400 hover:text-yellow-500 ${state.exam.marked[id] ? 'text-yellow-500' : ''}"><i class="fas fa-star"></i></button>
                    <label class="block font-bold mb-2 pr-6">${text}</label>
                    <textarea id="ans_${id}" oninput="saveAnswer('${id}', this.value)" class="w-full border rounded p-3 focus:ring focus:ring-blue-200 outline-none min-h-[100px] text-right" placeholder="הקלד או גרור טקסט לכאן...">${state.exam.answers[id] || ''}</textarea>
                </div>
            `;
        }

        function generateInput(id, text) {
            return `
                <div class="flex items-center gap-2 mb-2">
                    <label class="font-medium whitespace-nowrap">${text}</label>
                    <input type="text" id="ans_${id}" oninput="saveAnswer('${id}', this.value)" value="${state.exam.answers[id] || ''}" class="flex-grow border-b focus:border-blue-500 outline-none px-2 py-1">
                </div>
            `;
        }

        function generateVerbQuestion(idPrefix, titleHtml, binyanText, sentenceText) {
            return `
                <div class="border-b pb-4 relative">
                    <button onclick="toggleMark('${idPrefix}')" class="absolute left-0 top-0 text-gray-400 hover:text-yellow-500 ${state.exam.marked[idPrefix] ? 'text-yellow-500' : ''}"><i class="fas fa-star"></i></button>
                    <p class="mb-2 pr-6">${titleHtml}</p>
                    <div class="pr-6 space-y-2 text-sm">
                        <div class="flex items-center gap-2"><span>(1) שורש:</span><input type="text" oninput="saveAnswer('${idPrefix}_root', this.value)" value="${state.exam.answers[idPrefix+'_root'] || ''}" class="border-b outline-none text-center w-24"></div>
                        <div class="flex items-center gap-2"><span>(2) בניין:</span><input type="text" oninput="saveAnswer('${idPrefix}_binyan', this.value)" value="${state.exam.answers[idPrefix+'_binyan'] || ''}" class="border-b outline-none text-center w-24"></div>
                        <div class="flex items-center gap-2 flex-wrap">
                            <span>(3) פועל אחר באותו שורש בבניין ${binyanText}:</span>
                            <span class="bg-gray-100 px-2 py-1 rounded w-full mt-1">${sentenceText.replace('__________', `<input type="text" oninput="saveAnswer('${idPrefix}_fill', this.value)" value="${state.exam.answers[idPrefix+'_fill'] || ''}" class="border-b border-gray-400 bg-transparent outline-none text-center font-bold text-blue-700 w-24 mx-1">`)}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function getLockScreenHtml() {
            return `
                <div class="lock-screen">
                    <i class="fas fa-lock text-6xl text-red-500 mb-6 animate-pulse"></i>
                    <h2 class="text-4xl font-bold mb-4">הבחינה ננעלה!</h2>
                    <p class="text-xl mb-8">זוהתה יציאה ממסך מלא או פוקוס.</p>
                    <p class="text-lg mb-4 text-yellow-300">קרא/י למורה להזנת קוד שחרור:</p>
                    <input type="password" id="unlock-code" class="text-black text-center text-2xl p-3 rounded-lg border-4 border-red-500 outline-none w-64 mb-4" placeholder="קוד מורה">
                    <button onclick="attemptUnlock()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-lg text-xl transition">שחרר נעילה</button>
                    <p id="unlock-error" class="text-red-400 mt-4 font-bold hidden">קוד שגוי!</p>
                </div>
            `;
        }

        function getSummaryHtml() {
            // Mapping questions to display their status clearly
            const questionsMap = [
                {
                    chapter: "פרק א' - הבנת הנקרא",
                    questions: [
                        { id: '1', title: 'שאלה 1', keys: ['1a', '1b'] },
                        { id: '2', title: 'שאלה 2', keys: ['2a1', '2a2', '2b'] },
                        { id: '3', title: 'שאלה 3', keys: ['3a', '3b'] },
                        { id: '4', title: 'שאלה 4', keys: ['4a', '4b'] },
                        { id: '5', title: 'שאלה 5', keys: ['5w1', '5m1', '5s1', '5w2', '5m2', '5s2'] },
                        { id: '6', title: 'שאלה 6', keys: ['6a', '6b'] }
                    ]
                },
                {
                    chapter: "פרק ב' - חיבור",
                    questions: [
                        { id: '7', title: 'שאלה 7 (חיבור)', keys: ['essay'] }
                    ]
                },
                {
                    chapter: "פרק ג' - לשון",
                    questions: [
                        { id: '8', title: 'שאלה 8 (הפועל)', keys: ['8a_root', '8b_root', '8c_root', '8d_root', '8e_root'] },
                        { id: '9', title: 'שאלה 9 (שם העצם)', keys: ['9t1', '9t2', '9t3', '9t4', '9t5', '9t6'] },
                        { id: '10', title: 'שאלה 10 (מילות קישור)', keys: ['10a', '10b', '10c'] }
                    ]
                }
            ];

            let breakdownHtml = '<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6 text-right" dir="rtl">';

            questionsMap.forEach(ch => {
                breakdownHtml += `<div class="bg-white p-5 rounded-lg shadow-sm border border-blue-100">
                    <h3 class="font-bold text-lg text-blue-900 border-b-2 border-blue-200 pb-2 mb-4">${ch.chapter}</h3>
                    <ul class="space-y-3">`;
                
                ch.questions.forEach(q => {
                    let answeredCount = 0;
                    q.keys.forEach(k => {
                        const ans = state.exam.answers[k];
                        if (typeof ans === 'string' && ans.trim() !== '') answeredCount++;
                        else if (typeof ans === 'boolean' && ans === true) answeredCount++;
                        else if (ans !== null && ans !== undefined && ans !== '' && typeof ans !== 'string' && typeof ans !== 'boolean') answeredCount++;
                    });
                    
                    let statusHtml = '';
                    if (answeredCount === q.keys.length) {
                        statusHtml = '<span class="text-green-600 font-bold text-sm bg-green-50 px-2 py-1 rounded-full"><i class="fas fa-check ml-1"></i> נענה</span>';
                    } else if (answeredCount > 0) {
                        statusHtml = '<span class="text-yellow-600 font-bold text-sm bg-yellow-50 px-2 py-1 rounded-full"><i class="fas fa-exclamation-triangle ml-1"></i> חלקי</span>';
                    } else {
                        statusHtml = '<span class="text-red-500 font-bold text-sm bg-red-50 px-2 py-1 rounded-full"><i class="fas fa-times ml-1"></i> לא נענה</span>';
                    }

                    breakdownHtml += `<li class="flex justify-between items-center bg-gray-50 hover:bg-gray-100 p-2 rounded border border-gray-100 transition">
                        <span class="font-medium text-gray-800">${q.title}</span>
                        ${statusHtml}
                    </li>`;
                });
                breakdownHtml += `</ul></div>`;
            });
            breakdownHtml += '</div>';

            const markedCount = Object.keys(state.exam.marked).filter(k => state.exam.marked[k]).length;

            return `
                <div class="max-w-5xl mx-auto w-full mt-8 glass-panel rounded-xl p-8 border border-gray-200 shadow-lg mb-8">
                    <h2 class="text-3xl font-bold text-center text-blue-900 mb-2">סיכום לפני הגשה</h2>
                    <p class="text-center text-gray-600 mb-8">אנא ודא/י שענית על כל השאלות הנדרשות לפני ההגשה הסופית.</p>
                    
                    <!-- Detailed Breakdown -->
                    ${breakdownHtml}

                    <div class="mt-8 bg-yellow-50 p-4 rounded-lg border border-yellow-200 text-center">
                        <p class="text-yellow-800 font-bold">
                            <i class="fas fa-star text-yellow-500 ml-2"></i> שאלות שסומנו לבדיקה חוזרת: ${markedCount}
                        </p>
                    </div>

                    <div class="flex justify-between mt-10 border-t pt-8">
                        <button onclick="state.view='exam'; state.exam.section=1; render();" class="text-blue-600 hover:text-blue-800 font-bold px-6 py-3 border border-blue-200 rounded-lg hover:bg-blue-50 transition">
                            <i class="fas fa-arrow-right ml-2"></i> חזרה למבחן
                        </button>
                        <button id="submit-btn" onclick="window.submitExam()" class="bg-red-600 hover:bg-red-700 text-white text-xl font-bold py-3 px-12 rounded-lg shadow-lg transition transform hover:scale-105 flex items-center justify-center gap-2">
                            <i class="fas fa-paper-plane"></i> הגש בחינה סופית
                        </button>
                    </div>
                </div>
            `;
        }

        function getSubmittedHtml() {
            return `
                <div class="max-w-2xl mx-auto w-full mt-20 text-center glass-panel rounded-xl p-10 border border-gray-200 shadow-xl">
                    <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="fas fa-check text-5xl text-green-600"></i>
                    </div>
                    <h2 class="text-4xl font-bold text-gray-800 mb-4">הבחינה הוגשה בהצלחה!</h2>
                    <p class="text-xl text-gray-600 mb-8">תשובותיך נשמרו במערכת והועברו לבדיקת המורה.</p>
                    <p class="text-sm text-gray-400">ניתן לסגור חלון זה. להתראות!</p>
                </div>
            `;
        }

        function getStudentResultsHtml() {

            const comments = student.teacherComments || {};
            const score = student.score || 0;

            return `
                <div class="max-w-4xl mx-auto w-full mt-10 glass-panel rounded-xl p-8 border border-gray-200 shadow-lg">

                        <div class="text-5xl font-black text-green-600">${score}</div>
                    </div>

                    <div class="space-y-8 text-right" dir="rtl">
                        <h3 class="text-2xl font-bold text-blue-900 border-b border-blue-200 pb-2">פירוט התשובות והערות המורה:</h3>

                                <div class="bg-gray-50 p-3 rounded border"><strong>2. א (תקנה 2):</strong> <div class="mt-2 text-gray-800">${ans['2a2'] || 'לא נענה'}</div>${expectedHtml('מנגנון הפיקוח מסורבל והעונשים לא משמעותיים מספיק.')}</div>
                                <div class="bg-gray-50 p-3 rounded border"><strong>2. ב:</strong> <div class="mt-2 text-gray-800 whitespace-pre-wrap">${ans['2b'] || 'לא נענה'}</div>${expectedHtml('תחילה נשלחת אזהרה, לאחר מכן מוטל קנס, ורק בהפרה חוזרת ננקטים צעדים חמורים יותר.')}</div>
                                <div class="bg-gray-50 p-3 rounded border"><strong>3. א:</strong> <div class="mt-2 text-gray-800 whitespace-pre-wrap">${ans['3a'] || 'לא נענה'}</div>${expectedHtml('פרסום סרטונים יכול להוביל ללחץ ציבורי, שגורם לרשויות לפעול בשקיפות גבוהה יותר.')}</div>
                                <div class="bg-gray-50 p-3 rounded border"><strong>3. ב:</strong> <div class="mt-2 text-gray-800 whitespace-pre-wrap">${ans['3b'] || 'לא נענה'}</div>${expectedHtml('הכותב מציג עמדה מורכבת: מצד אחד, השפה החריפה עשויה להיתפס כהגזמה, ומצד שני היא עשויה לעורר את הציבור לפעולה כשאחרת לא מקשיבים לו.')}</div>
                                <div class="bg-gray-50 p-3 rounded border"><strong>4. א:</strong> <div class="mt-2 text-gray-800">${ans['4a'] || 'לא נענה'}</div>${expectedHtml('לדון במתח שבין רצון לאיכות חיים לבין הסכנה של הסלמה והקצנה בשיח ובאכיפה בעיר.')}</div>
                                <div class="bg-gray-50 p-3 rounded border"><strong>4. ב:</strong> <div class="mt-2 text-gray-800">${ans['4b'] || 'לא נענה'}</div>${expectedHtml('הכוונה שייכת לה / שלה (של הרשות המקומית).')}</div>
                                <div class="bg-gray-50 p-3 rounded border"><strong>5. מילה 1:</strong> <span class="text-blue-800">${ans['5w1']||'-'}</span> (פירוש: ${ans['5m1']||'-'} | משפט: ${ans['5s1']||'-'})</div>
                                <div class="bg-gray-50 p-3 rounded border"><strong>5. מילה 2:</strong> <span class="text-blue-800">${ans['5w2']||'-'}</span> (פירוש: ${ans['5m2']||'-'} | משפט: ${ans['5s2']||'-'})</div>
                                <div class="bg-gray-50 p-3 rounded border"><strong>6. א:</strong> <div class="mt-2 text-gray-800 whitespace-pre-wrap">${ans['6a'] || 'לא נענה'}</div>${expectedHtml('התקנות מצמצמות פעילות רועשת והקנסות מרתיעים את המפירים מלחזור על כך.')}</div>
                                <div class="bg-gray-50 p-3 rounded border"><strong>6. ב:</strong> <div class="mt-2 text-gray-800 whitespace-pre-wrap">${ans['6b'] || 'לא נענה'}</div>${expectedHtml('רעש מתמשך יכול להוביל ללחץ, חוסר אונים, עייפות וייאוש שפוגעים בבריאות הנפשית.')}</div>

                            </div>
                        </div>

                        <!-- פרק ב -->

                            <div class="mt-4 p-4 bg-yellow-50 border-r-4 border-yellow-400 rounded">
                                <h5 class="font-bold text-yellow-800 mb-1">הערות המורה לפרק ב':</h5>

                            <div class="space-y-4">
                                <div class="bg-gray-50 p-3 rounded border">
                                    <strong>8. הפועל:</strong>

                                        ב: ${ans['8b_root']||'-'}, ${ans['8b_binyan']||'-'}, ${ans['8b_fill']||'-'}<br>

        window.filterByClass = function(val) {

        window.deleteStudentExam = function(docId) {
            window.showModal('האם אתה בטוח שברצונך למחוק בחינה זו? הפעולה בלתי הפיכה!', true, async () => {
                if (window.firebaseLoaded && currentUser) {
                    try {
                        const studentDocRef = docRef(db, 'artifacts', appId, 'public', 'data', 'submissions', docId);
                        await deleteDoc(studentDocRef);
                    } catch(e) { console.error(e); }
                }
                // מחיקה מהגיבוי המקומי
                let localSubmissions = JSON.parse(localStorage.getItem('local_submissions') || '[]');
                localSubmissions = localSubmissions.filter(s => s.id !== docId && s.studentId !== docId);
                localStorage.setItem('local_submissions', JSON.stringify(localSubmissions));
                
                // ריענון רשימה
                studentsData = studentsData.filter(s => s.id !== docId && s.studentId !== docId);
                render();
            });
        };

        window.calcEssayScore = function() {
            const inputs = document.querySelectorAll('.rubric-input');
            let total = 0;
            inputs.forEach(input => {
                const val = parseFloat(input.value);
                if(!isNaN(val)) total += val;
            });
            const finalEssayEl = document.getElementById('essay_final_score');
            if(finalEssayEl) {
                finalEssayEl.value = total;
                window.calcTotalScore(); // Trigger main calculation
            }
        };

        // Auto calculation function for the teacher dashboard
        window.calcTotalScore = function() {
            const scoreInputs = document.querySelectorAll('.q-score');
            let total = 0;
            scoreInputs.forEach(input => {
                const val = parseFloat(input.value);
                if (!isNaN(val)) total += val;
            });
            
            // Round to 2 decimal places to handle float precision issues
            total = Math.round(total * 100) / 100;
            
            const calcScoreEl = document.getElementById('final_calc_score');
            if (calcScoreEl) calcScoreEl.value = total;
            
            const submitScoreEl = document.getElementById('final_submit_score');
            if (submitScoreEl) submitScoreEl.value = Math.round(total); // Suggest rounded final score
        };

        window.saveTeacherReview = async function(docId) {
            const finalScore = document.getElementById('final_submit_score').value;
            const scoreVal = parseInt(finalScore) || 0;
            
            const comments = {
                sec1: document.getElementById('comment_sec1').value,
                sec2: document.getElementById('comment_sec2').value,
                sec3: document.getElementById('comment_sec3').value
            };

            const btn = document.getElementById('btn-save-review');
            if(btn) {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> שומר...';
                btn.disabled = true;
            }

            let saved = false;

            // Try updating Firebase first
            if (window.firebaseLoaded && currentUser) {
                try {
                    const existsInCloud = studentsData.find(s => s.id === docId);
                    if (existsInCloud) {
                        const studentDocRef = docRef(db, 'artifacts', appId, 'public', 'data', 'submissions', docId);
                        await updateDoc(studentDocRef, {
                            score: scoreVal,
                            teacherComments: comments
                        });
                        saved = true;
                    }
                } catch(e) {
                    console.error("Error updating score in Firebase:", e);
                }
            }
            
            // Update local storage backup (if present)
            let localSubmissions = JSON.parse(localStorage.getItem('local_submissions') || '[]');
            let subIndex = localSubmissions.findIndex(s => s.id === docId || s.studentId === docId);
            if (subIndex > -1) {
                localSubmissions[subIndex].score = scoreVal;
                localSubmissions[subIndex].teacherComments = comments;
                localStorage.setItem('local_submissions', JSON.stringify(localSubmissions));
                saved = true;
            }

            if (saved) {
                window.showModal("הציון וההערות נשמרו בהצלחה!", false, () => {
                    state.view = 'teacher_dash';
                    render();
                });
            } else {
                window.showModal("שגיאה: לא ניתן למצוא את המבחן לשמירה. נסה שוב מאוחר יותר.");
                if(btn) {
                    btn.innerHTML = '<i class="fas fa-save"></i> שמור ציון והערות סופיות';
                    btn.disabled = false;
                }
            }
        };

        window.saveAnswer = function(id, val) {
            if(state.view === 'exam') {
                state.exam.answers[id] = val;
                localStorage.setItem('exam_answers', JSON.stringify(state.exam.answers));
            }
        };

        window.toggleMark = function(id) {
            state.exam.marked[id] = !state.exam.marked[id];
            localStorage.setItem('exam_marked', JSON.stringify(state.exam.marked));
            render(); 
        };

        window.handleTopicCheck = function(checkbox) {
            window.saveAnswer('topic_selected_' + checkbox.id, checkbox.checked);
        };

        window.navigateSection = function(dir) {
            let next = state.exam.section + dir;
            if (next >= 1 && next <= 3) {
                state.exam.section = next;
                render();
            }
        };

        window.attemptUnlock = function() {
            const input = document.getElementById('unlock-code').value;
            if (input === TEACHER_UNLOCK_CODE) {
                state.exam.isLocked = false;
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(()=>{});
                }
                render();
            } else {
                document.getElementById('unlock-error').classList.remove('hidden');
            }
        };

        window.submitExam = function() {
            window.showModal('האם אתה בטוח שברצונך להגיש את הבחינה? לא תוכל לשנות את התשובות לאחר מכן.', true, () => {
                const btn = document.getElementById('submit-btn');
                if (btn) {
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin ml-2"></i> מגיש, אנא המתן...';
                    btn.disabled = true;
                    btn.classList.add('opacity-70', 'cursor-not-allowed');
                }
                window.doSubmit();
            });
        };

        window.doSubmit = async function() {
            clearInterval(state.exam.timerInterval);
            
            if(document.fullscreenElement) {
                 document.exitFullscreen().catch(()=>{});
            }
            
            let submissionSuccess = false;

            // FIREBASE DATA SUBMISSION
            if (window.firebaseLoaded && currentUser) {
                try {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
                    await addDoc(colRef, {
                        studentId: state.user.id,
                        studentName: state.user.name,
                        classRoom: state.user.classRoom,
                        instCode: state.user.instCode,
                        answers: state.exam.answers,
                        timestamp: serverTimestamp(),
                        status: 'submitted',
                        score: null
                    });
                    submissionSuccess = true;
                } catch(e) {
                    console.error("שגיאה בשמירה ל-Firestore:", e);
                }
            }

            // FALLBACK TO LOCAL STORAGE IF FIREBASE FAILS
            if (!submissionSuccess) {
                console.warn("Saving to local storage fallback due to cloud error");
                const localSubmissions = JSON.parse(localStorage.getItem('local_submissions') || '[]');
                localSubmissions.push({
                    studentId: state.user.id,
                    studentName: state.user.name,
                    classRoom: state.user.classRoom,
                    answers: state.exam.answers,
                    date: new Date().toISOString()
                });
                localStorage.setItem('local_submissions', JSON.stringify(localSubmissions));
                
                // Show a brief notification that it saved locally, then proceed
                window.showModal("הייתה בעיה בחיבור לענן, אך המבחן הוגש ונשמר כגיבוי מקומי בהצלחה!");
            }

            state.view = 'submitted';
            localStorage.removeItem('exam_answers');
            localStorage.removeItem('exam_marked');
            render();
        };

        window.viewStudentExam = function(docId) {
            // Find student from Firebase data or Local backup
            const localSubmissions = JSON.parse(localStorage.getItem('local_submissions') || '[]');
            const allData = [...studentsData];
            
            localSubmissions.forEach(ls => {
                if(!allData.find(d => d.studentId === ls.studentId)) {
                    allData.push({ ...ls, id: ls.studentId, status: 'submitted_local' }); 
                }
            });

            const studentRecord = allData.find(s => s.id === docId || s.studentId === docId);
            
            if (studentRecord) {
                state.currentReview = studentRecord;
                state.view = 'teacher_review';
                render();
            } else {
                window.showModal("לא ניתן למצוא את פרטי המבחן במסד הנתונים.");
            }
        };

        window.exportToExcel = function() {
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "ת.ז,שם,כיתה,סטטוס,ציון\r\n";
            
            const localSubmissions = JSON.parse(localStorage.getItem('local_submissions') || '[]');
            const allData = [...studentsData];
            localSubmissions.forEach(ls => {
                if(!allData.find(d => d.studentId === ls.studentId)) {
                    allData.push({ ...ls, status: 'submitted_local' });
                }
            });

            allData.forEach(row => {
                let statusText = row.status === 'submitted' ? 'הוגש בענן' : (row.status === 'submitted_local' ? 'גיבוי מקומי' : 'נבחן כעת');
                csvContent += `${row.studentId || ''},${row.studentName || ''},${row.classRoom || ''},${statusText},${row.score||''}\r\n`;
            });
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "ציונים_שאלון_371.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        function startTimer() {
            if(state.exam.timerInterval) clearInterval(state.exam.timerInterval);
            state.exam.timerInterval = setInterval(() => {
                if (state.exam.timeRemaining > 0 && !state.exam.isLocked) {
                    state.exam.timeRemaining--;
                    updateHeader();
                } else if (state.exam.timeRemaining <= 0) {
                    clearInterval(state.exam.timerInterval);
                    window.showModal('הזמן נגמר! הבחינה מוגשת אוטומטית.', false, () => {
                        window.doSubmit();
                    });
                }
            }, 1000);
        }

        function lockExam() {
            if(state.view === 'exam' && !state.exam.isLocked) {
                state.exam.isLocked = true;
                render();
            }
        }

        function attachEventListeners() {
            const stuForm = document.getElementById('student-login-form');
            if (stuForm) {
                stuForm.onsubmit = async (e) => {
                    e.preventDefault();
                    
                    const stuId = document.getElementById('stu-id').value;
                    
                    state.user = {
                        role: 'student',
                        name: document.getElementById('stu-name').value,
                        id: stuId,
                        classRoom: document.getElementById('stu-class').value,
                        instCode: document.getElementById('stu-inst').value,
                        extraTime: document.getElementById('stu-extra').checked
                    };
                    
                    const btn = stuForm.querySelector('button[type="submit"]');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin ml-2"></i> בודק נתונים...';
                    btn.disabled = true;

                    let existingSubmission = null;

                    // Check Firebase for existing submission
                    if (window.firebaseLoaded && currentUser) {
                        try {
                            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
                            const snapshot = await getDocs(colRef);
                            snapshot.forEach(doc => {
                                const data = doc.data();
                                if (data.studentId === stuId) {
                                    existingSubmission = { id: doc.id, ...data };
                                }
                            });
                        } catch(e) {
                            console.error(e);
                        }
                    }

                    // Check Local Storage Backup
                    if (!existingSubmission) {
                        const localSubmissions = JSON.parse(localStorage.getItem('local_submissions') || '[]');
                        existingSubmission = localSubmissions.find(s => s.studentId === stuId);
                    }

                    btn.innerHTML = originalText;
                    btn.disabled = false;

                    if (existingSubmission) {
                        if (existingSubmission.score !== null && existingSubmission.score !== undefined) {
                            // Graded! Show results.
                            state.currentReview = existingSubmission;
                            state.view = 'student_results';
                        } else {
                            // Submitted but not graded yet
                            window.showModal('כבר הגשת את הבחינה. היא ממתינה כעת לבדיקת המורה.');
                            return; // Stop and wait
                        }
                    } else {
                        // First time taking the exam
                        state.view = 'instructions';
                    }
                    
                    render();
                };
            }

            const teaForm = document.getElementById('teacher-login-form');
            if (teaForm) {
                teaForm.onsubmit = (e) => {
                    e.preventDefault();
                    const code = document.getElementById('tea-code').value;
                    if (code === TEACHER_LOGIN_CODE) {
                        state.user.role = 'teacher';
                        state.view = 'teacher_dash';
                        loadSubmissions(); // Load actual real-time data from Firestore
                        render();
                    } else {
                        window.showModal('קוד בחינה שגוי!');
                    }
                };
            }

            const startBtn = document.getElementById('btn-start-exam');
            if (startBtn) {
                startBtn.onclick = () => {
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(err => console.log(err));
                    }
                    
                    state.view = 'exam';
                    state.exam.section = 1;
                    
                    const baseSeconds = EXAM_DURATION;
                    state.exam.timeRemaining = state.user.extraTime ? Math.floor(baseSeconds * EXTRA_TIME_MULTIPLIER) : baseSeconds;
                    
                    startTimer();
                    render();
                };
            }

            const logoutBtn = document.getElementById('btn-logout');
            if(logoutBtn) {
                logoutBtn.onclick = () => {
                    state.view = 'login';
                    state.user.role = null;
                    render();
                }
            }
        }

        // --- Security / Anti-Cheat ---

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && state.view === 'exam' && !state.exam.isLocked) {
                lockExam();
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && state.view === 'exam' && !state.exam.isLocked) {
                lockExam();
            }
        });

        document.addEventListener('copy', () => {
            state.internalCopy = true;
            setTimeout(() => { state.internalCopy = false; }, 3000);
        });

        document.addEventListener('paste', (e) => {
            if (state.view === 'exam') {
                if (!state.internalCopy) {
                    e.preventDefault();
                    window.showModal('שים לב: ההדבקה ממקורות חיצוניים חסומה!');
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'PrintScreen' && state.view === 'exam') {
                navigator.clipboard.writeText('צילום מסך נחסם ע"י המערכת.');
                window.showModal('צילום מסך חסום בבחינה.');
            }
        });

        // Initialize App
        render();
    </script>
</body>
</html>
